# ── Namespace ────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: app

---
# ── ConfigMap (shared env vars for both deployments) ─────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: app
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"

---
# ── Home Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-deployment
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
        - name: home
          image: allenaira/microservice:home   # ← your Docker Hub image
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config

---
# ── Home Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: home-service
  namespace: app
spec:
  selector:
    app: home
  ports:
    - port: 80
      targetPort: 80

---
# ── About Deployment ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: about-deployment
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: about
  template:
    metadata:
      labels:
        app: about
    spec:
      containers:
        - name: about
          image: allenaira/microservice:about  # ← your Docker Hub image
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config

---
# ── About Service ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: about-service
  namespace: app
spec:
  selector:
    app: about
  ports:
    - port: 80
      targetPort: 80

---
# ── Ingress (creates an AWS ALB) ──────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip          # required for Fargate
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-service
                port:
                  number: 80
          - path: /about
            pathType: Prefix
            backend:
              service:
                name: about-service
                port:
                  number: 80
