<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - EKS Fargate Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .badge {
      display: inline-block;
      background: #e0f7fa;
      color: #00838f;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 { font-size: 32px; color: #006064; margin-bottom: 16px; }
    p { color: #546e7a; line-height: 1.6; margin-bottom: 12px; font-size: 15px; }
    .highlight { background: #e0f7fa; border-radius: 8px; padding: 12px 16px; margin: 20px 0; }
    .highlight code { font-family: monospace; color: #00838f; font-size: 13px; }
    a.btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #006064;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    a.btn:hover { background: #00838f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Microservice 1</div>
    <h1>Home Page</h1>
    <p>This page is running inside its own <strong>Fargate pod</strong> on Amazon EKS.</p>
    <div class="highlight">
      <code>Namespace: app-ns | Deployment: home-deployment</code>
    </div>
    <p>The About page runs in a <em>completely separate pod</em> — true microservice architecture!</p>
    <a href="/about" class="btn">Visit About Page</a>
  </div>
</body>
</html>
