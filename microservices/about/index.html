<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About - EKS Fargate Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ede7f6 0%, #d1c4e9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .badge {
      display: inline-block;
      background: #ede7f6;
      color: #6a1b9a;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 { font-size: 32px; color: #4a148c; margin-bottom: 16px; }
    p { color: #546e7a; line-height: 1.6; margin-bottom: 12px; font-size: 15px; }
    .highlight { background: #ede7f6; border-radius: 8px; padding: 12px 16px; margin: 20px 0; }
    .highlight code { font-family: monospace; color: #6a1b9a; font-size: 13px; }
    a.btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #4a148c;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
    a.btn:hover { background: #6a1b9a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Microservice 2</div>
    <h1>About Page</h1>
    <p>This page runs in a <strong>separate Fargate pod</strong>, completely independent from the Home page.</p>
    <div class="highlight">
      <code>Namespace: app-ns | Deployment: about-deployment</code>
    </div>
    <p>Both are routed through a single <strong>Application Load Balancer</strong> using path-based routing.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
